<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>

<body>
    <div class="main">
        <div class="box">
            <img src="/Sarika/sarika3.jpeg" alt="Birthday Girl">
        </div>
        <div class="content">
            <h1>HAPPY BIRTHDAY SARI &#10084;</h1>
            <h3>#Cheers to 20!!🥂</h3>
            <p id="typing"></p>
        </div>
        <div class="button">
            <a href="next.html" target="_blank">
                <button>Unfold🌸</button>
            </a>
        </div>
    </div>
    <script>
        const text = `You are the person who means so much to me that words can never explain💎 Life has felt so
        much easier, and more beautiful ever since you became a part of it🫂 No matter where life takes us, our
        friendship will always be one of my greatest tressure🤗💫 May god give you more time in life...
        and may be a few seconds to react to my reels too😂😤 Be grateful for your teen years, because they 
        helped shape you into the amazing person you are today💃❤️✨ `;

        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typing").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }

        window.onload = typeWriter;
    </script>
</body>
